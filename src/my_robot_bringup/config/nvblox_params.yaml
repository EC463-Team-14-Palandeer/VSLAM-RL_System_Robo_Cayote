/**:
  ros__parameters:
    # --- 1. Global Setup ---
    global_frame: "odom"
    mapping_type: "dynamic" # Use "dynamic" for general moving objects
    use_dynamic_occupancy_layer: true
    
    # --- 2. Slicing Config (TOP LEVEL) ---
    esdf_mode: "2d"
    publish_esdf_distance_slice: true
    publish_static_map_slice: true
    publish_dynamic_map_slice: true
    publish_combined_map_slice: true
    update_esdf_rate_hz: 10.0

    # --- 3. THE STATIC MAPPER (Walls/Desks) ---
    static_mapper:
      esdf_slice_height: 0.0      # Cut at camera level
      esdf_2d_min_height: -0.2   # Look down slightly
      esdf_2d_max_height: 1.0    # Look up to 1m
      
    # --- 4. THE DYNAMIC MAPPER (You/Moving things) ---
    dynamic_mapper:
      esdf_slice_height: 0.0     # Must match static for a good combined map
      esdf_2d_min_height: -0.2
      esdf_2d_max_height: 1.0
      # How sensitive to motion
      dynamic_is_different_threshold_m: 0.1 

    # --- 5. Memory & Cleaning ---
    map_clearing_radius_m: 5.0
    decay_tsdf_rate_hz: 2.0
    voxel_size: 0.05